version: "3.3"
services:
  x11:
    build: 
      context: . 
      dockerfile: Dockerfile
    tty: true
    ports: 
      - 5900:5900
    depends_on:
      - torproxy
    networks: 
      tor:
        ipv4_address: 172.46.100.3
  torproxy:
    image: flungo/tor-router
    cap_add:
      - NET_ADMIN
    dns:
     - 127.0.0.1
    tty: true
    ports: 
      - 9050:9050
    networks: 
      tor:
        ipv4_address: 172.46.100.2
networks:
    tor:
      ipam:
        driver: default
        config:
          - subnet: 172.46.100.0/24
